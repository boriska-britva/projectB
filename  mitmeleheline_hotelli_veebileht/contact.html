<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <script src="https://kit.fontawesome.com/5751f2b9e6.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/style.css">
    
    <title>Hotell | Kontakt</title>
</head>
<body>

    <header>
        <!-- navigatsioon -->
        <nav id="navbar">
            <div class="container">
                <h1><a href="index.html">KHT</a></h1>
                <ul>
                    <li><a href="index.html">Avaleht</a></li>
                    <li><a href="about.html">Kirjeldus</a></li>
                    <li><a class="current" href="contact.html">Kontakt</a></li>
                    
                </ul>
            </div>
        </nav>
    </header>

    <!-- Kontakt vorm -->
    <section id="contact-form" class="py-30">
        <div class="container">
            <h1>Võta <span class="text-primary">Ühendust</span> Meiega</h1>
            <p>Palun täitke allolev vorm ja saadame teile vastuse võimalikult kiiresti.</p>
            <form action="">
                <div class="form-group">
                    <label for="name">Nimi:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">E-post:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Sõnum:</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="btn">Saada</button>
            </form>
        </div>
    </section>

    <!-- Kontaktinfo -->
    <section id="contact-info" class="bg-dark">
        <div class="container">
            <div class="box bg-dark">
                <i class="fas fa-map-marker-alt"></i>
                <h3>Aadress</h3>
                <p>Kopli 1A, Tartu</p>
            </div>
            <div class="box bg-dark">
                <i class="fas fa-phone"></i>
                <h3>Telefon</h3>
                <p>+1 234 567 890</p>
            </div>
            <div class="box">
                <i class="fas fa-envelope"></i>
                <h3>E-post</h3>
                <p>info@khthotell.ee</p>
            </div>
        </div>
    </section>

    <div class="clear"></div>

    <footer>
        <p>2026 KHT Hotell. Kõik õigused kaitstud.</p>
    </footer>

</body>
</html>
